[package]
name = "eventus-rs"
version = "0.1.0"
edition = "2021"

[dependencies]
askama = "0.12.1"
axum = "0.6.20"
chrono = "0.4.31"
diesel = { version = "2.1.3", features = ["chrono"] }
diesel-async = { version = "0.4.1", features = ["postgres"] }
dotenvy = "0.15.7"
serde = { version = "1.0.189", features = ["derive"] }
tokio = { version = "1.33.0", features = ["full"] }
tower-http = { version = "0.4.4", features = ["fs", "trace", "compression-gzip"] }
tracing = "0.1.39"
tracing-appender = "0.2.2"
tracing-subscriber = "0.3.17"

[profile.release]
strip = true
lto = true